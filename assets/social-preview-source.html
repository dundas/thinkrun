<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { width: 1280px; height: 640px; overflow: hidden; background: #FDFBF9; color: #111113;
         font-family: "Avenir Next", "Segoe UI", sans-serif; position: relative; }
  .serif { font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif; }
  .mono { font-family: "SFMono-Regular", Consolas, monospace; }
  .grain { position: absolute; inset: 0; opacity: .05; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.92' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.45'/%3E%3C/svg%3E"); }
  .orbit { position: absolute; right: -180px; top: -180px; width: 620px; height: 620px;
           border: 1.5px solid #f6d8c1; border-radius: 50%; }
  .orbit::before, .orbit::after { content: ""; position: absolute; border: 1.5px solid #fce4d2; border-radius: 50%; }
  .orbit::before { inset: 12%; } .orbit::after { inset: 26%; }
  .wrap { position: relative; z-index: 2; padding: 74px 90px; height: 100%;
          display: flex; flex-direction: column; justify-content: space-between; }
  .brandline { display: flex; align-items: center; gap: 22px; }
  .brandline img { width: 76px; height: 76px; border-radius: 18px; }
  .brand { font-size: 58px; font-style: italic; letter-spacing: -0.03em; }
  h1 { font-size: 78px; font-weight: 400; font-style: italic; letter-spacing: -0.055em;
       line-height: 0.95; max-width: 980px; }
  h1 em { color: #F97316; font-style: italic; }
  .sub { font-size: 27px; color: #66636a; max-width: 900px; line-height: 1.35; }
  .chips { display: flex; gap: 14px; }
  .chip { border: 1.5px solid #e9e5e1; background: #fff; border-radius: 999px;
          padding: 12px 24px; font-size: 21px; color: #4c484d; }
  .chip.hot { background: #FFF7ED; border-color: #fed7aa; color: #EA580C; font-weight: 600; }
  .rule { position: absolute; left: 90px; right: 90px; bottom: 58px; height: 0; }
  .footer { display: flex; justify-content: space-between; align-items: center;
            font-size: 20px; color: #999; letter-spacing: .08em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="orbit"></div>
  <div class="wrap">
    <div class="brandline">
      <img src="logo-400.png" alt="">
      <div class="brand serif">ThinkRun</div>
    </div>
    <h1 class="serif">The screen recorder that teaches agents <em>to see.</em></h1>
    <div class="sub">Record a bug once — hand Claude Code or Cursor structured context it can act on. Real Chrome, your sessions.</div>
    <div class="chips">
      <div class="chip hot">MCP + CLI</div>
      <div class="chip">4 portable agent skills</div>
      <div class="chip">Eval-benchmarked routing</div>
      <div class="chip mono">npx @thinkrun/mcp</div>
    </div>
    <div class="footer mono"><span>github.com/dundas/thinkrun</span><span>thinkrun.ai</span></div>
  </div>
</body>
</html>
